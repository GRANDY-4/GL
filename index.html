<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Locker | Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 50; }
        .game-card:hover { transform: translateY(-5px); border-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-bold tracking-tighter text-indigo-400">GAME <span class="text-white">LOCKER</span></h1>
        <button onclick="toggleModal()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm font-medium transition shadow-lg shadow-indigo-500/20">
            + Add Game (.zip)
        </button>
    </header>

    <main id="main-content" class="flex-grow p-10">
        <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center py-20">
            <div class="glass w-24 h-24 rounded-2xl flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
            </div>
            <h2 class="text-3xl font-semibold mb-2">Your locker is empty</h2>
            <p class="text-slate-400">Upload a ZIP to populate your library.</p>
        </div>

        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            </div>
    </main>

    <div id="uploadModal" class="modal p-4">
        <div class="glass p-8 rounded-2xl max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">Add New Game</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Game Title</label>
                    <input type="text" id="gameTitle" class="w-full bg-slate-900 border border-white/10 rounded p-2 focus:outline-none focus:border-indigo-500" placeholder="e.g. Cyberpunk 2077">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Select ZIP File</label>
                    <input type="file" id="gameZip" accept=".zip" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">
                </div>
                <div id="installingStatus" class="hidden text-indigo-400 text-sm animate-pulse">
                    Scanning dependencies and extracting...
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="saveGame()" class="flex-1 bg-indigo-600 p-2 rounded font-bold hover:bg-indigo-500">Install</button>
                    <button onclick="toggleModal()" class="flex-1 bg-slate-800 p-2 rounded font-bold hover:bg-slate-700">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameGrid = document.getElementById('game-grid');
        const emptyState = document.getElementById('empty-state');

        // Initialize Library from LocalStorage (the "Cookie" equivalent)
        let library = JSON.parse(localStorage.getItem('gameLocker')) || [];

        function renderLibrary() {
            gameGrid.innerHTML = '';
            if (library.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                library.forEach((game, index) => {
                    gameGrid.innerHTML += `
                        <div class="game-card glass rounded-xl overflow-hidden transition-all duration-300 border border-white/5 cursor-pointer">
                            <div class="h-40 bg-gradient-to-br from-indigo-900 to-slate-800 flex items-center justify-center">
                                <span class="text-4xl">🎮</span>
                            </div>
                            <div class="p-4">
                                <h4 class="font-bold truncate">${game.title}</h4>
                                <p class="text-xs text-slate-500 uppercase mt-1">Status: Installed</p>
                                <button onclick="runGame('${game.title}')" class="mt-4 w-full bg-white/10 hover:bg-white/20 py-2 rounded text-sm font-bold transition">PLAY</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function toggleModal() {
            const modal = document.getElementById('uploadModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveGame() {
            const title = document.getElementById('gameTitle').value;
            const file = document.getElementById('gameZip').value;
            const status = document.getElementById('installingStatus');

            if (!title || !file) return alert("Please provide a title and select a ZIP!");

            status.classList.remove('hidden');

            // Simulate "Steam" Installation Delay
            setTimeout(() => {
                library.push({ title: title, date: new Date().toLocaleDateString() });
                localStorage.setItem('gameLocker', JSON.stringify(library));
                
                status.classList.add('hidden');
                document.getElementById('gameTitle').value = '';
                document.getElementById('gameZip').value = '';
                
                toggleModal();
                renderLibrary();
            }, 1500);
        }

        function runGame(name) {
            alert(`Launching ${name}...\n(Note: In a real browser, we'd trigger a local launcher protocol here!)`);
        }

        // Run on load
        renderLibrary();
    </script>
</body>
</html>
