<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Locker | Auto-Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .game-card { background: #111; border: 1px solid #222; transition: 0.3s; }
        .game-card:hover { border-color: #6366f1; transform: scale(1.02); }
        .loading-shimmer { background: linear-gradient(90s, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-black text-indigo-500 italic">LOCKER<span class="text-white">OS</span></h1>
            <label class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-full font-bold cursor-pointer transition">
                IMPORT ZIP / GAME
                <input type="file" id="zipInput" class="hidden" accept=".zip,.html">
            </label>
        </header>

        <div id="status-bar" class="hidden mb-6 p-4 bg-indigo-900/20 border border-indigo-500/30 rounded-xl text-indigo-400 font-mono text-sm">
            [SYS] Initializing Compiler...
        </div>

        <div id="library" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </div>

    <script>
        const zipInput = document.getElementById('zipInput');
        const statusBar = document.getElementById('status-bar');
        const libraryEl = document.getElementById('library');

        let locker = JSON.parse(localStorage.getItem('v3_locker')) || [];

        zipInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            log(`Detecting format: ${file.name}`);
            
            if (file.name.endsWith('.html')) {
                // Direct HTML Import
                const reader = new FileReader();
                reader.onload = (res) => saveToLocker(file.name, res.target.result);
                reader.readAsText(file);
            } else if (file.name.endsWith('.zip')) {
                // ZIP Compilation
                processZip(file);
            }
        });

        async function processZip(file) {
            log("Unzipping archive...");
            const zip = new JSZip();
            const contents = await zip.loadAsync(file);
            
            let htmlContent = "";
            let jsContent = "";
            let cssContent = "";

            // SCANNERS: Find the entry points
            for (let filename in contents.files) {
                const fileData = contents.files[filename];
                if (filename.endsWith('index.html') || filename.endsWith('.html')) {
                    htmlContent = await fileData.async("string");
                } else if (filename.endsWith('.js')) {
                    jsContent += await fileData.async("string") + "\n";
                } else if (filename.endsWith('.css')) {
                    cssContent += await fileData.async("string") + "\n";
                }
            }

            if (!htmlContent) {
                log("Error: No entry point (.html) found in ZIP.", true);
                return;
            }

            log("Compiling assets into sandboxed runtime...");
            
            // Build the Final "Hidden" Runtime
            const finalRuntime = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>${cssContent}</style>
                </head>
                <body>
                    ${htmlContent}
                    <script>${jsContent}<\/script>
                </body>
                </html>
            `;

            saveToLocker(file.name.replace('.zip', ''), finalRuntime);
        }

        function saveToLocker(name, source) {
            locker.push({ name, source: btoa(unescape(encodeURIComponent(source))) });
            localStorage.setItem('v3_locker', JSON.stringify(locker));
            log(`Success: ${name} added to library.`);
            render();
        }

        function launch(index) {
            const game = locker[index];
            const source = decodeURIComponent(escape(atob(game.source)));
            const blob = new Blob([source], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        function render() {
            libraryEl.innerHTML = locker.map((g, i) => `
                <div class="game-card p-4 rounded-2xl cursor-pointer" onclick="launch(${i})">
                    <div class="aspect-square bg-zinc-900 rounded-xl mb-4 flex items-center justify-center text-4xl shadow-inner">
                        🎮
                    </div>
                    <div class="font-bold truncate text-center">${g.name}</div>
                    <div class="text-[10px] text-zinc-500 text-center mt-2 tracking-widest uppercase font-black">Boot in New Tab</div>
                </div>
            `).join('');
        }

        function log(msg, isError = false) {
            statusBar.classList.remove('hidden');
            statusBar.innerText = `[SYS] ${msg}`;
            if (isError) statusBar.classList.add('text-red-500');
            setTimeout(() => statusBar.classList.add('hidden'), 4000);
        }

        render();
    </script>
</body>
</html>
