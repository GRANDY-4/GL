<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Locker | Stealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .game-btn { background: #111; border: 1px solid #333; transition: 0.2s; }
        .game-btn:active { background: #222; transform: scale(0.98); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black mb-8 text-center text-indigo-500">GAME LOCKER <span class="text-white text-xs opacity-50">V5</span></h1>

        <div class="bg-zinc-900 p-4 rounded-2xl mb-6">
            <p class="text-[10px] uppercase font-bold text-zinc-500 mb-2 tracking-widest">Manual Entry</p>
            <input type="text" id="gName" placeholder="Game Title" class="w-full bg-black border border-zinc-800 p-3 rounded-lg mb-2 text-sm">
            <textarea id="gCode" placeholder="Paste Game HTML/JS Code here..." class="w-full h-32 bg-black border border-zinc-800 p-3 rounded-lg text-xs font-mono mb-3"></textarea>
            <button onclick="addGame()" class="w-full bg-indigo-600 py-3 rounded-lg font-bold">ADD TO LOCKER</button>
        </div>

        <div id="locker-list" class="space-y-3">
            </div>
    </div>

    <script>
        let locker = JSON.parse(localStorage.getItem('stealth_locker')) || [];

        function addGame() {
            const name = document.getElementById('gName').value;
            const code = document.getElementById('gCode').value;
            
            if (name && code) {
                // We store it as raw text first to avoid "Server/Blob" errors
                locker.push({ name, code });
                localStorage.setItem('stealth_locker', JSON.stringify(locker));
                
                document.getElementById('gName').value = '';
                document.getElementById('gCode').value = '';
                render();
            }
        }

        function launch(index) {
            const game = locker[index];
            
            // BYPASS METHOD: DATA URI
            // We don't use 'URL.createObjectURL' because iPads block it.
            // We open a new window and document.write the code directly.
            const win = window.open('', '_blank');
            if (win) {
                win.document.open();
                win.document.write(game.code);
                win.document.close();
            } else {
                alert("Pop-up blocked! Tap the 'Pop-up Blocked' icon in the URL bar and click 'Always Allow'.");
            }
        }

        function deleteGame(i, e) {
            e.stopPropagation();
            locker.splice(i, 1);
            localStorage.setItem('stealth_locker', JSON.stringify(locker));
            render();
        }

        function render() {
            const list = document.getElementById('locker-list');
            list.innerHTML = locker.map((g, i) => `
                <div onclick="launch(${i})" class="game-btn p-4 rounded-xl flex justify-between items-center cursor-pointer">
                    <span class="font-bold">${g.name}</span>
                    <button onclick="deleteGame(${i}, event)" class="text-zinc-600 hover:text-red-500 text-xs px-2">Delete</button>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
